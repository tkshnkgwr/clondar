name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: clondar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: clondar

      - name: Checkout common_lib
        uses: actions/checkout@v7
        with:
          repository: tkshnkgwr/common_lib
          path: common_lib
          token: ${{ secrets.PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'clondar/src-tauri -> clondar/src-tauri/target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: clondar/ui

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        run: tauri build

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            clondar/src-tauri/target/release/bundle/nsis/*.exe
            clondar/src-tauri/target/release/bundle/wix/*.msi
          tag_name: ${{ github.ref_name }}
          name: 'Clondar Pro ${{ github.ref_name }}'
          body: 'Please refer to CHANGELOG.md for details of this release.'
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
