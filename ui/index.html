<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clondar Pro - Desktop App</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    
    <!-- React & Tailwind & Motion CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- htm (Hyperscript Tagged Markup) CDN for buildless jsx alternative -->
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="transition-colors duration-500" data-tauri-drag-region style="background: transparent !important;">
    <div id="root" data-tauri-drag-region style="background: transparent !important;">
        <div style="color: #666; font-family: sans-serif; text-align: center; margin-top: 20%;">Loading Clondar Pro (ESM)...</div>
      </div>
  
      <!-- ESM Entrypoint -->
      <script type="module" src="./src/main.js"></script>
  </body>
  </html>
