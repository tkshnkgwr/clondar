<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clondar Pro - Desktop App</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
        }
    </script>

    <style>
        /* グラスモーフィズムと透過背景の最適化 */
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        html, body { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: transparent !important;
            pointer-events: auto;
        }
        #root { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background: transparent !important;
        }
        
        /* スクロールバーを完全に隠す */
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        /* デスクトップウィジェット専用設定: 選択・ドラッグ・メニュー禁止 */
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none;
            cursor: default;
        }
        /* ドラッグ可能エリアの設定 */
        [data-tauri-drag-region] {
            cursor: move !important;
        }
        button, a, .cursor-pointer { cursor: pointer !important; }
    </style>
</head>
<body class="transition-colors duration-500" data-tauri-drag-region style="background: transparent !important;">
    <div id="root" data-tauri-drag-region style="background: transparent !important;">
        <div style="color: #666; font-family: sans-serif;">Loading Clondar Pro...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const MotionObj = window.Motion || window.framerMotion || { motion: (p) => <div {...p} />, AnimatePresence: ({children}) => <>{children}</> };
        const { motion, AnimatePresence } = MotionObj;

        // --- Tauri v2 API Wrapper ---
        const getTauriWindow = () => {
            try {
                if (window.__TAURI__ && window.__TAURI__.window) {
                    return window.__TAURI__.window.getCurrentWindow();
                }
                if (window.__TAURI__ && window.__TAURI__.getCurrentWindow) {
                    return window.__TAURI__.getCurrentWindow();
                }
            } catch (e) {
                console.error("Tauri API access error:", e);
            }
            return null;
        };

        const setAlwaysOnTop = async (on) => {
            const win = getTauriWindow();
            if (win) await win.setAlwaysOnTop(on);
        };

        const closeWindow = async () => {
            const win = getTauriWindow();
            if (win) await win.close();
        };

        // --- Logic: 日本祝日計算 (歴史的精度向上版) ---
        const HolidayLogic = {
            getHolidays: (yearParam) => {
                const year = parseInt(yearParam);
                const holidays = {};
                const formatDate = (d) => `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
                
                const getNthMonday = (y, m, n) => {
                    const firstDay = new Date(y, m - 1, 1);
                    let day = firstDay.getDay();
                    let date = 1 + (day === 1 ? 0 : (8 - day) % 7) + (n - 1) * 7;
                    return new Date(y, m - 1, date);
                };

                if (year < 1948) return {};

                // 固定祝日
                holidays[`${year}-01-01`] = "元日";
                
                // 成人の日
                if (year >= 2000) holidays[formatDate(getNthMonday(year, 1, 2))] = "成人の日";
                else if (year >= 1949) holidays[`${year}-01-15`] = "成人の日";

                // 建国記念の日
                if (year >= 1967) holidays[`${year}-02-11`] = "建国記念の日";

                // 天皇誕生日
                if (year >= 2020) holidays[`${year}-02-23`] = "天皇誕生日";
                else if (year >= 1989 && year <= 2018) holidays[`${year}-12-23`] = "天皇誕生日";
                else if (year >= 1949 && year <= 1988) holidays[`${year}-04-29`] = "天皇誕生日";

                // 憲法記念日 / こどもの日
                if (year >= 1949) {
                    holidays[`${year}-05-03`] = "憲法記念日";
                    holidays[`${year}-05-05`] = "こどもの日";
                }

                // 昭和の日 / みどりの日
                if (year >= 2007) {
                    holidays[`${year}-04-29`] = "昭和の日";
                    holidays[`${year}-05-04`] = "みどりの日";
                } else if (year >= 1989) {
                    holidays[`${year}-04-29`] = "みどりの日";
                    if (year >= 2006) holidays[`${year}-05-04`] = "みどりの日"; // 2006年は暫定
                }

                // 山の日
                if (year >= 2016) holidays[`${year}-08-11`] = "山の日";

                // 文化の日 / 勤労感謝の日
                if (year >= 1948) {
                    holidays[`${year}-11-03`] = "文化の日";
                    holidays[`${year}-11-23`] = "勤労感謝の日";
                }

                // 海の日
                if (year >= 2003) holidays[formatDate(getNthMonday(year, 7, 3))] = "海の日";
                else if (year >= 1996) holidays[`${year}-07-20`] = "海の日";

                // 敬老の日
                if (year >= 2003) holidays[formatDate(getNthMonday(year, 9, 3))] = "敬老の日";
                else if (year >= 1966) holidays[`${year}-09-15`] = "敬老の日";

                // 体育の日 / スポーツの日
                if (year >= 2020) holidays[formatDate(getNthMonday(year, 10, 2))] = "スポーツの日";
                else if (year >= 2000) holidays[formatDate(getNthMonday(year, 10, 2))] = "体育の日";
                else if (year >= 1966) holidays[`${year}-10-10`] = "体育の日";

                // 天文計算による祝日
                const springEquinox = Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
                holidays[`${year}-03-${springEquinox.toString().padStart(2, '0')}`] = "春分の日";
                const autumnEquinox = Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
                holidays[`${year}-09-${autumnEquinox.toString().padStart(2, '0')}`] = "秋分の日";

                // 振替休日 (1973年以降)
                if (year >= 1973) {
                    const baseHolidays = Object.keys(holidays).sort();
                    baseHolidays.forEach(dateStr => {
                        const date = new Date(dateStr);
                        if (date.getDay() === 0) {
                            let substitute = new Date(date);
                            substitute.setDate(substitute.getDate() + 1);
                            while (holidays[formatDate(substitute)]) {
                                substitute.setDate(substitute.getDate() + 1);
                            }
                            holidays[formatDate(substitute)] = "振替休日";
                        }
                    });
                }
                
                // 国民の休日 (祝日に挟まれた平日, 1986年以降)
                if (year >= 1986) {
                    const sortedKeys = Object.keys(holidays).sort();
                    for (let i = 0; i < sortedKeys.length - 1; i++) {
                        let d1 = new Date(sortedKeys[i]);
                        let d2 = new Date(sortedKeys[i+1]);
                        let diff = (d2 - d1) / (1000 * 60 * 60 * 24);
                        if (diff === 2) {
                            let bridgeDay = new Date(d1);
                            bridgeDay.setDate(bridgeDay.getDate() + 1);
                            if (bridgeDay.getDay() !== 0) {
                                holidays[formatDate(bridgeDay)] = "国民の休日";
                            }
                        }
                    }
                }

                return holidays;
            }
        };

        // --- UI Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                clock: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 6v6l4 2" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                'chevron-left': <polyline points="15 18 9 12 15 6"/>,
                'chevron-right': <polyline points="9 18 15 12 9 6"/>,
                sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                pin: <path d="M12 17v5M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const DigitalClock = ({ time, is24Hour, showSeconds }) => {
            const options = { hour: '2-digit', minute: '2-digit', second: showSeconds ? '2-digit' : undefined, hour12: !is24Hour };
            const timeStr = new Intl.DateTimeFormat('en-US', options).format(time);
            const parts = timeStr.split(' ');
            const mainTime = parts[0];
            const amPm = parts[1];

            return (
                <div className="flex flex-col items-center justify-center select-none">
                    <div className="h-8 flex items-center justify-center">
                        {!is24Hour && amPm && <div className="text-xl font-bold text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em]">{amPm}</div>}
                    </div>
                    <div className="text-8xl font-normal text-blue-600 dark:text-white drop-shadow-md flex items-center justify-center min-w-[450px]" 
                         style={{ fontFamily: 'Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif', lineHeight: '1', letterSpacing: '0.02em' }}>
                        {mainTime.split('').map((char, index) => (
                            <span key={index} className="inline-block text-center" style={{ width: char === ':' ? '0.25em' : '0.7em', fontVariantNumeric: 'tabular-nums' }}>{char}</span>
                        ))}
                    </div>
                    <div className="h-8" />
                </div>
            );
        };

        const AnalogClock = ({ time, showSeconds }) => {
            const seconds = time.getSeconds() + time.getMilliseconds() / 1000;
            const minutes = time.getMinutes() + seconds / 60;
            const hours = (time.getHours() % 12) + minutes / 60;
            return (
                <div className="relative w-56 h-56 rounded-full border-2 border-slate-200 dark:border-slate-700 bg-white/30 dark:bg-slate-800/30 glass shadow-inner flex items-center justify-center">
                    {[...Array(12)].map((_, i) => {
                        const isMain = i % 3 === 0;
                        const h = isMain ? 16 : 12;
                        const w = isMain ? 6 : 4;
                        return (
                            <div key={i} className={`absolute rounded-full ${isMain ? 'bg-blue-500' : 'bg-slate-400 dark:bg-slate-600'}`}
                                style={{
                                    width: `${w}px`, height: `${h}px`, top: '50%', left: '50%',
                                    marginTop: `-${h / 2}px`, marginLeft: `-${w / 2}px`,
                                    transform: `rotate(${i * 30}deg) translateY(-92px)`,
                                }}
                            />
                        );
                    })}
                    <motion.div className="absolute w-1.5 h-14 bg-slate-800 dark:bg-slate-100 rounded-full origin-bottom z-3" style={{ bottom: '50%', rotate: `${hours * 30}deg` }} />
                    <motion.div className="absolute w-1 h-20 bg-slate-500 dark:bg-slate-400 rounded-full origin-bottom z-2" style={{ bottom: '50%', rotate: `${minutes * 6}deg` }} />
                    {showSeconds && <motion.div className="absolute w-0.5 h-24 bg-red-500 rounded-full origin-bottom z-4" style={{ bottom: '50%', rotate: `${seconds * 6}deg` }} />}
                    <div className="absolute w-3.5 h-3.5 bg-slate-800 dark:bg-slate-100 rounded-full z-10 shadow-sm border-2 border-white dark:border-slate-800" />
                </div>
            );
        };

        const Calendar = ({ currentMonth, setCurrentMonth, isDark, onShowYearly, isTransparent }) => {
            const holidays = useMemo(() => HolidayLogic.getHolidays(currentMonth.getFullYear()), [currentMonth.getFullYear()]);
            const monthStart = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
            const startDay = monthStart.getDay();
            const startDate = new Date(monthStart);
            startDate.setDate(startDate.getDate() - startDay);
            const calendarDays = [];
            let curr = new Date(startDate);
            for (let i = 0; i < 42; i++) { calendarDays.push(new Date(curr)); curr.setDate(curr.getDate() + 1); }

            const [hoveredHoliday, setHoveredHoliday] = useState(null);

            return (
                <div className={`w-full max-w-xl transition-all duration-300 glass rounded-2xl p-6 shadow-xl border border-white/20 dark:border-slate-700/30 relative ${isTransparent ? 'bg-white/20 dark:bg-slate-900/20' : 'bg-white/80 dark:bg-slate-900/80'}`}>
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="text-2xl font-black text-slate-900 dark:text-white tracking-tight">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月</h2>
                        <div className="flex items-center gap-2">
                            <button onClick={onShowYearly} className="px-3 py-1 text-xs font-bold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors">今年</button>
                            <button onClick={() => setCurrentMonth(new Date())} className="px-3 py-1 text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">今月</button>
                            <div className="flex gap-1 ml-1">
                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"><Icon name="chevron-left" className="text-slate-600 dark:text-slate-200" /></button>
                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"><Icon name="chevron-right" className="text-slate-600 dark:text-slate-200" /></button>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-7 mb-2">
                        {['日', '月', '火', '水', '木', '金', '土'].map((day, idx) => (
                            <div key={day} className={`text-center text-xs font-black uppercase tracking-wider py-2 ${idx === 0 ? 'text-red-500' : idx === 6 ? 'text-blue-500' : 'text-slate-400'}`}>{day}</div>
                        ))}
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                        {calendarDays.map((day) => {
                            const dateStr = `${day.getFullYear()}-${(day.getMonth() + 1).toString().padStart(2, '0')}-${day.getDate().toString().padStart(2, '0')}`;
                            const holidayName = holidays[dateStr];
                            const isCurrentMonth = day.getMonth() === currentMonth.getMonth();
                            const today = new Date();
                            const isDayToday = day.getDate() === today.getDate() && day.getMonth() === today.getMonth() && day.getFullYear() === today.getFullYear();
                            return (
                                <div key={day.toString()} 
                                     onMouseEnter={() => holidayName && setHoveredHoliday({ name: holidayName })}
                                     onMouseLeave={() => setHoveredHoliday(null)}
                                     className={`relative h-12 flex items-center justify-center rounded-lg transition-all group cursor-default ${!isCurrentMonth ? 'opacity-20' : 'opacity-100'} ${isDayToday ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30 font-bold' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                    <span className={`text-base font-medium ${!isDayToday && holidayName ? 'text-red-500 font-bold' : !isDayToday && day.getDay() === 0 ? 'text-red-500' : !isDayToday && day.getDay() === 6 ? 'text-blue-500' : 'text-slate-700 dark:text-slate-300'}`}>{day.getDate()}</span>
                                    {holidayName && <div className="absolute bottom-1 w-1 h-1 bg-red-400 rounded-full" />}
                                    
                                    <AnimatePresence>
                                        {hoveredHoliday && holidayName === hoveredHoliday.name && (
                                            <motion.div 
                                                initial={{ opacity: 0, y: 10 }}
                                                animate={{ opacity: 1, y: 0 }}
                                                exit={{ opacity: 0, y: 10 }}
                                                className="absolute bottom-full mb-2 z-50 px-3 py-1.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-bold rounded-lg shadow-xl whitespace-nowrap pointer-events-none"
                                            >
                                                {holidayName}
                                                <div className="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-900 dark:border-t-white" />
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const YearlyView = ({ year: initialYear, onClose, isDark }) => {
            const [currentYear, setCurrentYear] = useState(initialYear);
            const months = Array.from({ length: 12 }, (_, i) => i);
            const holidays = useMemo(() => HolidayLogic.getHolidays(currentYear), [currentYear]);
            const formatDate = (d) => `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
            const [hoveredHoliday, setHoveredHoliday] = useState(null);

            return (
                <motion.div 
                    initial={{ opacity: 0, scale: 0.95 }}
                    animate={{ opacity: 1, scale: 1 }}
                    exit={{ opacity: 0, scale: 0.95 }}
                    className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md"
                >
                    <div className="bg-white dark:bg-slate-900 w-full max-w-6xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-white/20 dark:border-slate-800">
                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                            <div className="flex items-center gap-6">
                                <h2 className="text-3xl font-black text-slate-900 dark:text-white">{currentYear}年 年間カレンダー</h2>
                                <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl shadow-inner">
                                    <button onClick={() => setCurrentYear(currentYear - 1)} className="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-lg transition-all text-slate-600 dark:text-slate-400"><Icon name="chevron-left" size={20} /></button>
                                    <button onClick={() => setCurrentYear(new Date().getFullYear())} className="px-3 py-1 text-xs font-bold text-slate-500 hover:text-blue-500 transition-colors">今年</button>
                                    <button onClick={() => setCurrentYear(currentYear + 1)} className="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-lg transition-all text-slate-600 dark:text-slate-400"><Icon name="chevron-right" size={20} /></button>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500"><Icon name="x" size={24} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-12">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                {months.map(m => (
                                    <div key={m} className="flex flex-col gap-3">
                                        <h3 className="text-lg font-bold text-blue-600 dark:text-blue-400 ml-2">{m + 1}月</h3>
                                        <div className="grid grid-cols-7 gap-1">
                                            {['日', '月', '火', '水', '木', '金', '土'].map((d, i) => (
                                                <div key={d} className={`text-[10px] font-bold text-center py-1 ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-400'}`}>{d}</div>
                                            ))}
                                            {(() => {
                                                const start = new Date(currentYear, m, 1).getDay();
                                                const days = new Date(currentYear, m + 1, 0).getDate();
                                                const cells = [];
                                                for (let i = 0; i < start; i++) cells.push(<div key={`empty-${i}`} />);
                                                for (let d = 1; d <= days; d++) {
                                                    const date = new Date(currentYear, m, d);
                                                    const dateStr = formatDate(date);
                                                    const holidayName = holidays[dateStr];
                                                    const isSun = date.getDay() === 0;
                                                    const isSat = date.getDay() === 6;
                                                    const isToday = new Date().toDateString() === date.toDateString();
                                                    cells.push(
                                                        <div key={d} 
                                                             onMouseEnter={() => holidayName && setHoveredHoliday({ name: holidayName, month: m, day: d })}
                                                             onMouseLeave={() => setHoveredHoliday(null)}
                                                             className={`relative flex items-center justify-center text-xs h-7 rounded-md transition-colors ${isToday ? 'bg-blue-500 text-white font-bold' : holidayName || isSun ? 'text-red-500 font-bold' : isSat ? 'text-blue-500' : 'text-slate-600 dark:text-slate-400'} ${holidayName ? 'hover:bg-red-50 dark:hover:bg-red-900/20' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                                            {d}
                                                            {holidayName && <div className="absolute bottom-0.5 w-1 h-1 bg-red-400 rounded-full" />}
                                                            
                                                            <AnimatePresence>
                                                                {hoveredHoliday && hoveredHoliday.name === holidayName && hoveredHoliday.month === m && hoveredHoliday.day === d && (
                                                                    <motion.div 
                                                                        initial={{ opacity: 0, y: 10 }}
                                                                        animate={{ opacity: 1, y: 0 }}
                                                                        exit={{ opacity: 0, y: 10 }}
                                                                        className="absolute bottom-full mb-2 z-[150] px-3 py-1.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[10px] font-bold rounded-lg shadow-2xl whitespace-nowrap pointer-events-none"
                                                                    >
                                                                        {holidayName}
                                                                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-900 dark:border-t-white" />
                                                                    </motion.div>
                                                                )}
                                                            </AnimatePresence>
                                                        </div>
                                                    );
                                                }
                                                return cells;
                                            })()}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const WindowFrame = ({ children, title, isDark, isPinned, setIsPinned, isTransparent, setIsTransparent }) => {
            return (
                <div 
                    className={`flex flex-col rounded-2xl overflow-hidden transition-all duration-300 w-[1060px] h-[560px] mx-auto ${isTransparent ? 'bg-white/30 dark:bg-slate-900/30 glass' : 'bg-slate-50 dark:bg-slate-950'}`}
                    data-tauri-drag-region
                >
                    <div className="flex items-center justify-between px-4 py-2 bg-white/50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800 select-none" data-tauri-drag-region>
                        <div className="flex items-center gap-2" data-tauri-drag-region>
                            <div className="w-3 h-3 rounded-full bg-blue-500" />
                            <div className="flex items-baseline gap-1.5" data-tauri-drag-region>
                                <span className="text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-widest">{title}</span>
                                {/* UPDATE 2026-06-15: 位置記憶バグが完全に修正されたため、表示バージョンをv1.2.0へ更新。なぜ：システム構成・仕様のバージョンに合わせるため */}
                                <span className="text-[10px] font-medium text-slate-400 dark:text-slate-500 tracking-wider">v1.2.0</span>
                                {/* UPDATE 2026-06-15: END */}
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => { setIsPinned(!isPinned); setAlwaysOnTop(!isPinned); }} className={`p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors ${isPinned ? 'text-blue-500' : 'text-slate-400'}`} title="最前面表示"><Icon name="pin" size={14} /></button>
                            <button onClick={() => setIsTransparent(!isTransparent)} className={`p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors ${isTransparent ? 'text-blue-500' : 'text-slate-400'}`} title="背景透過"><Icon name="sun" size={14} /></button>
                            <div className="w-px h-4 bg-slate-200 dark:bg-slate-800 mx-1" />
                            <button onClick={closeWindow} className="p-1 rounded hover:bg-red-500 hover:text-white text-slate-400 transition-colors"><Icon name="x" size={14} /></button>
                        </div>
                    </div>
                    <div className="flex-1 p-8">{children}</div>
                </div>
            );
        };

        function App() {
            // UPDATE 2026-06-15: 起動直後の初期位置決めや復元動作の最中に、ウィンドウ移動イベントを誤検知してLocalStorageに上書き保存し、前回の位置を消失させるバグを解決するためのフラグレフです。
            const isRestoringRef = React.useRef(true);
            // UPDATE 2026-06-15: END

            const [time, setTime] = useState(new Date());
            const [is24Hour, setIs24Hour] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [clockType, setClockType] = useState('digital');
            const [showSeconds, setShowSeconds] = useState(true);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [isPinned, setIsPinned] = useState(true);
            const [showYearly, setShowYearly] = useState(false);
            const [isTransparent, setIsTransparent] = useState(false);

            // 設定の読み込み
            useEffect(() => {
                const saved24H = localStorage.getItem('is24Hour');
                if (saved24H !== null) setIs24Hour(saved24H === 'true');
                
                const savedSeconds = localStorage.getItem('showSeconds');
                if (savedSeconds !== null) setShowSeconds(savedSeconds === 'true');
                
                const savedClockType = localStorage.getItem('clockType');
                if (savedClockType) setClockType(savedClockType);
                
                const savedDarkMode = localStorage.getItem('isDarkMode');
                if (savedDarkMode !== null) setIsDarkMode(savedDarkMode === 'true');

                const savedTransparent = localStorage.getItem('isTransparent');
                if (savedTransparent !== null) setIsTransparent(savedTransparent === 'true');

                const savedPinned = localStorage.getItem('isPinned');
                if (savedPinned !== null) {
                    setIsPinned(savedPinned === 'true');
                    setAlwaysOnTop(savedPinned === 'true');
                }

                // UPDATE 2026-06-15: ウィンドウ位置の復帰において、起動直後の自動センター寄せ(tauri:center=true)が確定した適切なタイミングで、前回の絶対的な物理座標を DPI スケールの影響を受けないように Physical で直接再適用します。さらに復元フェーズが終わるまで位置検出ロックをかけることで状態復元バグの無限ループを防ぎます。
                const restorePosition = async () => {
                    try {
                        const win = getTauriWindow();
                        if (win) {
                            const savedPos = localStorage.getItem('windowPosition');
                            if (savedPos) {
                                const pos = JSON.parse(savedPos);
                                if (pos && typeof pos.x === 'number' && typeof pos.y === 'number') {
                                    // 起動直後の自動センター配置からスムーズに引き継ぐための適切な遅延時間（300ms）を確保
                                    await new Promise(resolve => setTimeout(resolve, 300));
                                    await win.setOuterPosition({ x: pos.x, y: pos.y, type: pos.type || 'Physical' });
                                }
                            }
                        }
                    } catch (err) {
                        console.error("Restore position failed:", err);
                    } finally {
                        // 復元アニメーションやOSの座標決定が完全に落ち着いた1秒後に、ユーザーの手動移動の検知を開始させます。
                        setTimeout(() => {
                            isRestoringRef.current = false;
                        }, 1000);
                    }
                };
                restorePosition();
                // UPDATE 2026-06-15: END
            }, []);

            // 設定の保存
            useEffect(() => {
                localStorage.setItem('is24Hour', is24Hour);
                localStorage.setItem('showSeconds', showSeconds);
                localStorage.setItem('clockType', clockType);
                localStorage.setItem('isDarkMode', isDarkMode);
                localStorage.setItem('isTransparent', isTransparent);
                localStorage.setItem('isPinned', isPinned);
            }, [is24Hour, showSeconds, clockType, isDarkMode, isTransparent, isPinned]);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 100);
                
                // UPDATE 2026-06-15: 移動イベントハンドラとポーリングを改修。起動プロセス（自動中央表示、および位置復帰中）での一時的な中間座標や初期座標を検知してlocalStorageに誤って上書き保存し、本来保存すべき前回の位置を消失させてしまうバグを防ぐため、isRestoringRef.currentがtrueの期間は保存をスキップします。また、型情報(type: 'Physical')を併せて保存することで、DPIスケーリングによるズレを解決します。
                // 位置の即時保存リスナー (Tauri v2)
                let unlistenMove;
                const setupMoveListener = async () => {
                    const win = getTauriWindow();
                    if (win && win.listen) {
                        unlistenMove = await win.listen('tauri://move', async () => {
                            if (isRestoringRef.current) return;
                            const pos = await win.outerPosition();
                            if (pos) {
                                localStorage.setItem('windowPosition', JSON.stringify({ x: pos.x, y: pos.y, type: pos.type || 'Physical' }));
                            }
                        });
                    }
                };
                setupMoveListener();

                // フォールバック用のポーリング (念のため)
                const posTimer = setInterval(async () => {
                    if (isRestoringRef.current) return;
                    const win = getTauriWindow();
                    if (win) {
                        const pos = await win.outerPosition();
                        if (pos) {
                            localStorage.setItem('windowPosition', JSON.stringify({ x: pos.x, y: pos.y, type: pos.type || 'Physical' }));
                        }
                    }
                }, 5000);
                // UPDATE 2026-06-15: END
                
                // コンテキストメニュー禁止
                window.oncontextmenu = (e) => { e.preventDefault(); return false; };

                // Escキーで終了
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        closeWindow();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);

                return () => {
                    clearInterval(timer);
                    clearInterval(posTimer);
                    if (unlistenMove) unlistenMove.then(f => f());
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            return (
                <div className="h-full flex items-center justify-center p-4 transition-colors duration-500 overflow-hidden relative" data-tauri-drag-region>
                    <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/20 blur-[120px] rounded-full pointer-events-none" />
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-400/20 blur-[120px] rounded-full pointer-events-none" />
                    
                    <WindowFrame title="Clondar Pro" isDark={isDarkMode} isPinned={isPinned} setIsPinned={setIsPinned} isTransparent={isTransparent} setIsTransparent={setIsTransparent}>
                        <div className="flex flex-row gap-12 items-start">
                            <div className="flex flex-col items-center gap-8 w-[500px] flex-shrink-0 z-10">
                                <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl shadow-inner relative z-20">
                                    <button onClick={() => setClockType('digital')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${clockType === 'digital' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}><Icon name="clock" size={16} />DIGITAL</button>
                                    <button onClick={() => setClockType('analog')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${clockType === 'analog' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}><Icon name="clock" size={16} />ANALOG</button>
                                </div>
                                <div className="flex-1 flex items-center justify-center min-h-[300px]">
                                    {clockType === 'digital' ? <DigitalClock time={time} is24Hour={is24Hour} showSeconds={showSeconds} /> : <AnalogClock time={time} showSeconds={showSeconds} />}
                                </div>
                                <div className="flex items-center justify-center gap-3 mt-auto">
                                    <button onClick={() => setIs24Hour(!is24Hour)} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all shadow-sm ${is24Hour ? 'bg-blue-500 text-white shadow-blue-500/20' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>{is24Hour ? '24H' : '12H'}</button>
                                    <button onClick={() => setShowSeconds(!showSeconds)} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all shadow-sm ${showSeconds ? 'bg-blue-500 text-white shadow-blue-500/20' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>秒表示: {showSeconds ? 'ON' : 'OFF'}</button>
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors shadow-sm">{isDarkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}</button>
                                </div>
                            </div>
                            <div className="w-px bg-slate-200 dark:bg-slate-800 self-stretch" />
                            <div className="flex-1 w-full flex flex-col gap-4">
                                <div className="flex items-center gap-2 text-slate-400 mb-2"><Icon name="calendar" size={16} /><span className="text-xs font-bold uppercase tracking-widest">Calendar</span></div>
                                <Calendar currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} isDark={isDarkMode} onShowYearly={() => setShowYearly(true)} isTransparent={isTransparent} />
                            </div>
                        </div>
                    </WindowFrame>

                    <AnimatePresence>
                        {showYearly && (
                            <YearlyView 
                                year={currentMonth.getFullYear()} 
                                onClose={() => setShowYearly(false)} 
                                isDark={isDarkMode} 
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
